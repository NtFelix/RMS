name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: ${{ matrix.platform }}
          tags: rms-frontend:latest
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Smoke test
        run: |
          docker run -d \
            --name mietevo-smoke \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co \
            -e NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder \
            rms-frontend:latest

          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Status}}' mietevo-smoke 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "exited" ]; then
              echo "Container exited unexpectedly."
              docker logs mietevo-smoke
              exit 1
            fi
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "307" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "Container is healthy (HTTP $HTTP_CODE)."
              exit 0
            fi
            echo "Attempt $i/30: HTTP $HTTP_CODE — retrying in 2s..."
            sleep 2
          done

          echo "Smoke test failed: container did not respond in time."
          docker logs mietevo-smoke
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm -f mietevo-smoke || true
