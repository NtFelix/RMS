name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'playwright/snapshots.yml'
      - '**/snapshots.yml'
  pull_request:
    paths-ignore:
      - 'playwright/snapshots.yml'
      - '**/snapshots.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Always runs on every PR ─────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # ─── Docker Build and Smoke Test ─────────────────────────────────────────────

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, type-check, build-app]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Set Image Name & Tag
        id: image
        run: |
          IMAGE_BASE="europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mietevo/mietevo"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG="latest"
          else
            TAG="branch-${{ github.ref_name }}"
          fi
          echo "full_name=$IMAGE_BASE:$TAG" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.full_name }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ github.event_name == 'pull_request' && secrets.STAGING_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ github.event_name == 'pull_request' && secrets.STAGING_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,mode=max,scope=docker-build

      - name: Smoke test
        run: |
          docker pull ${{ steps.image.outputs.full_name }}
          docker run -d \
            --name mietevo-smoke \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co \
            -e NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder \
            ${{ steps.image.outputs.full_name }}

          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Status}}' mietevo-smoke 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "exited" ]; then
              echo "Container exited unexpectedly."
              docker logs mietevo-smoke
              exit 1
            fi
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "307" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "Container is healthy (HTTP $HTTP_CODE)."
              exit 0
            fi
            echo "Attempt $i/30: HTTP $HTTP_CODE — retrying in 2s..."
            sleep 2
          done

          echo "Smoke test failed: container did not respond in time."
          docker logs mietevo-smoke
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm -f mietevo-smoke || true

  # ─── Detects whether UI-relevant files changed ───────────────────────────────

  check-visual-run:
    name: Check for Visual Run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    outputs:
      should-run: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.run == 'true' }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for relevant file changes
        id: filter
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E \
            '^(app|components|lib|hooks|public|styles|playwright)/|\.css$|playwright\.config\.ts$' \
            || true)

          if [ -n "$CHANGED" ]; then
            echo "Relevant files changed:"
            echo "$CHANGED"
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "No relevant files changed — skipping visual review"
            echo "run=false" >> $GITHUB_OUTPUT
          fi


  # ─── Only runs when UI files changed ─────────────────────────────────────────

  install-playwright:
    name: Install Playwright Browsers
    runs-on: ubuntu-latest
    needs: [check-visual-run, lint, build-app, type-check]
    if: needs.check-visual-run.outputs.should-run == 'true'
    outputs:
      playwright-cache-key: ${{ steps.playwright-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm_config_legacy_peer_deps=true npm ci --prefer-offline

      - name: Generate Playwright cache key
        id: playwright-key
        run: echo "key=${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.playwright-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

  build-app:
    name: Build Application
    runs-on: ubuntu-latest
    outputs:
      build-cache-key: ${{ steps.build-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm_config_legacy_peer_deps=true npm ci --prefer-offline

      - name: Generate build cache key
        id: build-key
        run: |
          SOURCE_HASH=$(find app components lib hooks types public -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.css" \) -exec sha256sum {} \; 2>/dev/null | sort | sha256sum | cut -d' ' -f1 || echo "no-files")
          echo "key=${{ runner.os }}-nextjs-build-${SOURCE_HASH}-${{ hashFiles('**/package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*') }}" >> $GITHUB_OUTPUT

      - name: Restore build cache
        id: build-cache
        uses: actions/cache@v5
        with:
          path: .next
          key: ${{ steps.build-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-

      - name: Build Next.js app
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: mock-stripe-key

      - name: Save build cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .next
          key: ${{ steps.build-key.outputs.key }}

  visual-review:
    name: Visual Review (PostHog)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [lint, type-check, check-visual-run, install-playwright, build-app]
    if: needs.check-visual-run.outputs.should-run == 'true'
    steps:
      - name: Checkout (latest branch tip)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm_config_legacy_peer_deps=true npm ci --prefer-offline

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ needs.install-playwright.outputs.playwright-cache-key }}
          fail-on-cache-miss: true

      - name: Install Playwright system dependencies
        run: npx playwright install-deps

      - name: Restore build cache
        id: restore-build
        uses: actions/cache/restore@v5
        with:
          path: .next
          key: ${{ needs.build-app.outputs.build-cache-key }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-

      - name: Build Next.js app (cache miss fallback)
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Run Playwright visual tests
        run: npx playwright test --project=chromium --grep @visual --reporter=list
        env:
          BASE_URL: http://localhost:3000
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        continue-on-error: true

      - name: Install PostHog Visual Review CLI
        if: always()
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/PostHog/posthog.git /tmp/posthog
          cd /tmp/posthog
          git sparse-checkout set products/visual_review/cli
          cd products/visual_review/cli
          npm ci

      - name: Create PostHog Visual Review run
        if: always()
        id: vr-run
        run: |
          RUN_ID=$(npx tsx /tmp/posthog/products/visual_review/cli/src/index.ts run create \
            --type playwright \
            --baseline playwright/snapshots.yml \
            --token ${{ secrets.POSTHOG_VR_TOKEN }} \
            --branch ${{ github.event.pull_request.head.ref || github.ref_name }} \
            --commit $(git rev-parse HEAD) \
            ${{ github.event_name == 'pull_request' && format('--pr {0}', github.event.pull_request.number) || '' }})
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Created PostHog VR run: $RUN_ID"

      - name: Upload snapshots to PostHog Visual Review
        if: always() && steps.vr-run.outputs.run-id != ''
        run: |
          npx tsx /tmp/posthog/products/visual_review/cli/src/index.ts run upload \
            --run-id ${{ steps.vr-run.outputs.run-id }} \
            --dir playwright/__snapshots__ \
            --baseline playwright/snapshots.yml \
            --token ${{ secrets.POSTHOG_VR_TOKEN }}

      - name: Wait for PostHog diff processing
        if: always() && steps.vr-run.outputs.run-id != ''
        id: vr-complete
        run: |
          npx tsx /tmp/posthog/products/visual_review/cli/src/index.ts run complete \
            --run-id ${{ steps.vr-run.outputs.run-id }} \
            --baseline playwright/snapshots.yml \
            --token ${{ secrets.POSTHOG_VR_TOKEN }} 2>&1 | tee vr-output.txt || echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Generate PostHog Visual Review Summary
        if: always() && steps.vr-run.outputs.run-id != ''
        run: |
          REVIEW_URL="https://eu.posthog.com/project/76914/visual_review/runs/${{ steps.vr-run.outputs.run-id }}"
          STATS=$(grep "Done:" vr-output.txt || true)
          echo "### 🎨 PostHog Visual Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$STATS" ]; then
            SUMMARY=$(echo "$STATS" | sed 's/.*Done: //')
            echo "✅ **Processing Complete**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Result: $SUMMARY" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏳ **Processing Timed Out / Interrupted**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The diff engine is still working or encountered an issue. Please check the dashboard manually." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔍 **[Review Visual Changes on PostHog]($REVIEW_URL)**" >> $GITHUB_STEP_SUMMARY
          if grep -q "Visual changes detected" vr-output.txt; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
            echo "> **Visual regressions or new snapshots detected.** Please review and approve them in PostHog to update the baseline." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.vr-complete.outputs.exit_code }}" == "1" ]; then
             echo "Visual changes detected. Review required."
             exit 1
          fi

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Comment Deployment Started
        uses: actions/github-script@v7
        id: start-comment
        with:
          script: |
            const prNumber = context.issue.number;
            const marker = '<!-- preview-deploy-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existingComment = comments.find(c => c.body.includes(marker));
            const body = `${marker}\n⏳ **Deploying new version...** It won't take long!`;
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
            return new Date().toISOString();

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy Preview to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: mietevo
          region: europe-west1
          image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mietevo/mietevo:pr-${{ github.event.pull_request.number }}
          tag: pr-${{ github.event.pull_request.number }}
          labels: pr=pr-${{ github.event.pull_request.number }}
          no_traffic: true
          env_vars: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STAGING_STRIPE_KEY }}

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          START_TIME: ${{ steps.start-comment.outputs.result }}
        with:
          script: |
            const startTime = new Date(process.env.START_TIME);
            const endTime = new Date();
            const durationMs = endTime - startTime;
            const durationSec = Math.floor(durationMs / 1000);
            const durationStr = durationSec > 60 
              ? `${Math.floor(durationSec / 60)}m ${durationSec % 60}s`
              : `${durationSec}s`;
            
            const prNumber = context.issue.number;
            const marker = '<!-- preview-deploy-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existingComment = comments.find(c => c.body.includes(marker));
            
            const body = `${marker}\n✅ **New version is live!**\n\n🔗 **[View Preview](${process.env.DEPLOY_URL})**\n\n🕒 **Deployed at:** ${endTime.toLocaleString('de-DE')}\n⏱️ **Duration:** ${durationStr}`;
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: mietevo
          region: europe-west1
          image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mietevo/mietevo:latest
          env_vars: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
