name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'playwright/snapshots.yml'
      - '**/snapshots.yml'
  pull_request:
    paths-ignore:
      - 'playwright/snapshots.yml'
      - '**/snapshots.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Always runs on every PR ─────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # ─── Docker Build and Smoke Test ─────────────────────────────────────────────

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, type-check, build-app]
    outputs:
      start_time: ${{ steps.start-timer.outputs.start_time }}
    permissions:
      contents: read
      packages: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: .next
          key: ${{ needs.build-app.outputs.build-cache-key }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-

      - name: Comment Build Started
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        id: start-timer
        with:
          script: |
            const prNumber = context.issue.number;
            const marker = '<!-- preview-deploy-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existingComment = comments.find(c => c.body.includes(marker));
            const body = `${marker}\n⏳ **Building Docker container...** It won't take long!`;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
            core.setOutput('start_time', new Date().toISOString());

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Set Image Name & Tag
        id: image
        run: |
          IMAGE_BASE="europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mietevo/mietevo"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG="latest"
          else
            TAG="branch-${{ github.ref_name }}"
          fi
          echo "full_name=$IMAGE_BASE:$TAG" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.full_name }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ github.event_name == 'pull_request' && secrets.STAGING_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ github.event_name == 'pull_request' && secrets.STAGING_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ github.event_name == 'pull_request' && secrets.STAGING_STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_WORKER_URL=${{ secrets.NEXT_PUBLIC_WORKER_URL }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_MIETEVO_MCP_URL=${{ secrets.NEXT_PUBLIC_MIETEVO_MCP_URL }}
            POSTHOG_PROJECT_ID=${{ secrets.POSTHOG_PROJECT_ID }}
            POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}
          secrets: |
            "POSTHOG_PERSONAL_API_KEY=${{ secrets.POSTHOG_PERSONAL_API_KEY }}"
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,mode=max,scope=docker-build

      - name: Smoke test
        id: smoke-test
        run: |
          docker pull ${{ steps.image.outputs.full_name }}
          docker run -d \
            --name mietevo-smoke \
            -p 3000:3000 \
            --health-cmd='node -e "require(\"http\").get({hostname:\"localhost\",port:process.env.PORT||3000,path:\"/\",timeout:2000},(res)=>{process.exit(res.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))"' \
            --health-interval=10s \
            --health-timeout=5s \
            --health-start-period=40s \
            --health-retries=3 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co \
            -e NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder \
            ${{ steps.image.outputs.full_name }}

          # Give container a moment to start
          sleep 2

          # Check 1: Verify container is still running
          INITIAL_STATUS=$(docker inspect --format='{{.State.Status}}' mietevo-smoke 2>/dev/null || echo "not_found")
          if [ "$INITIAL_STATUS" != "running" ]; then
            echo "❌ Container failed to start (status: $INITIAL_STATUS)"
            echo "Container logs:"
            docker logs mietevo-smoke
            exit 1
          fi
          echo "✓ Container started successfully"

          # Check 2: Scan logs for critical errors during startup
          STARTUP_ERRORS=$(docker logs mietevo-smoke 2>&1 | grep -iE "^.*error|^.*fatal|^.*panic|^.*uncaught|^.*exception" | grep -v "warning\|WarningLogLevel\|deprecated" | head -10 || true)
          if [ -n "$STARTUP_ERRORS" ]; then
            echo "⚠️  Critical errors detected in logs:"
            echo "$STARTUP_ERRORS"
            # Log full output for debugging
            echo "---"
            echo "Full container logs:"
            docker logs mietevo-smoke | tail -50
            exit 1
          fi
          echo "✓ No critical startup errors"

          # Check 3: Wait for HTTP endpoint to be responsive
          echo "Waiting for HTTP endpoint..."
          HTTP_SUCCESS=false
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Status}}' mietevo-smoke 2>/dev/null || echo "not_found")
            if [ "$STATUS" != "running" ]; then
              echo "❌ Container stopped unexpectedly (status: $STATUS)"
              docker logs mietevo-smoke
              exit 1
            fi
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "307" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "✓ HTTP endpoint healthy (HTTP $HTTP_CODE)"
              HTTP_SUCCESS=true
              break
            fi
            
            if [ $i -eq 30 ]; then
              echo "❌ HTTP endpoint did not respond after 60s"
              echo "Last HTTP code: $HTTP_CODE"
              echo "Container logs:"
              docker logs mietevo-smoke
              exit 1
            fi
            echo "  Attempt $i/30: HTTP $HTTP_CODE — retrying in 2s..."
            sleep 2
          done
          
          if [ "$HTTP_SUCCESS" != "true" ]; then
            exit 1
          fi

          # Check 4: Validate response content
          echo "Validating response content..."
          RESPONSE_HEADERS=$(curl -s -i http://localhost:3000 2>/dev/null | head -20)
          CONTENT_TYPE=$(echo "$RESPONSE_HEADERS" | grep -i "content-type" || true)
          if [ -z "$CONTENT_TYPE" ]; then
            echo "⚠️  Warning: No content-type header found"
          else
            echo "✓ Content-Type header present: $(echo "$CONTENT_TYPE" | cut -d: -f2- | xargs)"
          fi
          
          # Check for HTML content
          BODY=$(curl -s http://localhost:3000 2>/dev/null | head -c 500)
          if echo "$BODY" | grep -qi "<!doctype\|<html"; then
            echo "✓ Valid HTML response received"
          else
            echo "⚠️  Warning: No HTML doctype found in response"
          fi

          # Check 5: Verify Next.js assets are served
          echo "Checking Next.js assets availability..."
          ASSETS_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/_next/static/ 2>/dev/null || echo "000")
          if [ "$ASSETS_CHECK" = "200" ] || [ "$ASSETS_CHECK" = "404" ]; then
            echo "✓ Next.js static assets endpoint accessible (HTTP $ASSETS_CHECK)"
          else
            echo "⚠️  Warning: Unexpected response from _next/static/ (HTTP $ASSETS_CHECK)"
          fi
          
          # Check 6: Verify healthcheck endpoint
          echo "Checking Docker healthcheck status..."
          sleep 1
          HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' mietevo-smoke 2>/dev/null || echo "none")
          echo "Container health status: $HEALTH_STATUS"
          if [ "$HEALTH_STATUS" = "healthy" ] || [ "$HEALTH_STATUS" = "starting" ]; then
            echo "✓ Healthcheck passed or in progress"
          elif [ "$HEALTH_STATUS" = "unhealthy" ]; then
            echo "❌ Container healthcheck failed"
            docker inspect mietevo-smoke | grep -A 10 '"Health"'
            exit 1
          fi
          
          echo ""
          echo "✅ All smoke tests passed!"

      - name: Cleanup smoke test container
        if: always()
        run: |
          if docker inspect mietevo-smoke &>/dev/null; then
            echo "Stopping smoke test container..."
            docker stop mietevo-smoke || true
            docker rm -f mietevo-smoke || true
            echo "✓ Cleanup complete"
          fi

  # ─── Detects which frontend quality jobs should run ─────────────────────────

  check-runs:
    name: Check Runs
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      should-run-visual: ${{ steps.visual.outputs.should-run-visual }}
      should-run-lighthouse: ${{ steps.lighthouse.outputs.should-run-lighthouse }}
      lighthouse-device-matrix: ${{ steps.lighthouse.outputs.device-matrix }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check visual review scope
        id: visual
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-run-visual=true" >> $GITHUB_OUTPUT
            echo "Reason: Manual trigger - running visual review"
            exit 0
          fi

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "should-run-visual=false" >> $GITHUB_OUTPUT
            echo "Reason: Visual review only runs on pull requests or manual dispatch"
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E \
            '^(app|components|lib|hooks|public|styles|playwright)/|\.css$|playwright\.config\.ts$' \
            || true)

          if [ -n "$CHANGED" ]; then
            echo "Relevant files changed:"
            echo "$CHANGED"
            echo "should-run-visual=true" >> $GITHUB_OUTPUT
          else
            echo "No relevant files changed — skipping visual review"
            echo "should-run-visual=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Lighthouse audit scope
        id: lighthouse
        run: |
          FULL_MATRIX='["mobile", "desktop", "tablet"]'
          DESKTOP_ONLY='["desktop"]'

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-run-lighthouse=true" >> $GITHUB_OUTPUT
            echo "device-matrix=$FULL_MATRIX" >> $GITHUB_OUTPUT
            echo "Reason: Manual trigger - running Lighthouse on all devices"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should-run-lighthouse=true" >> $GITHUB_OUTPUT
            echo "device-matrix=$FULL_MATRIX" >> $GITHUB_OUTPUT
            echo "Reason: Push to main - running Lighthouse on all devices"
          elif [[ "${{ github.event_name }}" == "pull_request" && ("${{ github.event.action }}" == "opened" || "${{ github.event.action }}" == "reopened") ]]; then
            echo "should-run-lighthouse=true" >> $GITHUB_OUTPUT
            echo "device-matrix=$FULL_MATRIX" >> $GITHUB_OUTPUT
            echo "Reason: PR opened/reopened - running Lighthouse on all devices"
          elif [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.action }}" == "synchronize" ]]; then
            echo "should-run-lighthouse=false" >> $GITHUB_OUTPUT
            echo "device-matrix=$DESKTOP_ONLY" >> $GITHUB_OUTPUT
            echo "Reason: PR synchronize - skipping Lighthouse because it already ran on PR open"
          else
            echo "should-run-lighthouse=false" >> $GITHUB_OUTPUT
            echo "device-matrix=$DESKTOP_ONLY" >> $GITHUB_OUTPUT
            echo "Reason: Unhandled event - skipping Lighthouse"
          fi

  # ─── Only runs when UI files changed ─────────────────────────────────────────

  install-playwright:
    name: Install Playwright Browsers
    runs-on: ubuntu-latest
    needs: [check-runs, lint, build-app, type-check]
    if: needs.check-runs.outputs.should-run-visual == 'true'
    outputs:
      playwright-cache-key: ${{ steps.playwright-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm_config_legacy_peer_deps=true npm ci --prefer-offline

      - name: Generate Playwright cache key
        id: playwright-key
        run: echo "key=${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.playwright-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

  build-app:
    name: Build Application
    runs-on: ubuntu-latest
    outputs:
      build-cache-key: ${{ steps.build-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm_config_legacy_peer_deps=true npm ci --prefer-offline

      - name: Generate build cache key
        id: build-key
        run: |
          # Deterministic cache key based on critical build inputs
          # Includes: package-lock.json, config files, and source code hash
          LOCK_HASH=${{ hashFiles('**/package-lock.json') }}
          CONFIG_HASH=${{ hashFiles('next.config.*', 'tsconfig.json', 'tailwind.config.*', '.env.example') }}
          SOURCE_HASH=$(find app components lib hooks types -type f \( -name "*.ts" -o -name "*.tsx" \) -exec sha256sum {} \; 2>/dev/null | sort | sha256sum | cut -d' ' -f1 || echo "no-source")
          echo "key=${{ runner.os }}-nextjs-build-${LOCK_HASH:0:12}-${CONFIG_HASH:0:12}-${SOURCE_HASH:0:12}" >> $GITHUB_OUTPUT
          echo "Cache key: ${{ runner.os }}-nextjs-build-${LOCK_HASH:0:12}-${CONFIG_HASH:0:12}-${SOURCE_HASH:0:12}"

      - name: Restore build cache
        id: build-cache
        uses: actions/cache@v5
        with:
          path: .next
          key: ${{ steps.build-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-

      - name: Build Next.js app
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: mock-stripe-key

      - name: Save build cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .next
          key: ${{ steps.build-key.outputs.key }}

  prepare-lhci:
    name: Prepare LHCI Tools
    runs-on: ubuntu-latest
    needs: [check-runs, build-app, lint, type-check]
    if: needs.check-runs.outputs.should-run-lighthouse == 'true'
    timeout-minutes: 3
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore LHCI tools cache
        id: lhci-cache
        uses: actions/cache@v5
        with:
          path: |
            lhci-tools/node_modules
            lhci-tools/package.json
            lhci-tools/package-lock.json
          key: lhci-tools-${{ runner.os }}-0.12.x

      - name: Create package.json and install LHCI tools
        if: steps.lhci-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p lhci-tools
          cd lhci-tools
          echo '{"name":"lhci-tools","private":true}' > package.json
          npm install @lhci/cli@0.12.x wait-on
          echo "✓ LHCI tools installed and cached"

  lighthouse:
    name: Lighthouse Audit (${{ matrix.device }})
    runs-on: ubuntu-latest
    needs: [check-runs, build-app, prepare-lhci]
    if: needs.check-runs.outputs.should-run-lighthouse == 'true'
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.check-runs.outputs.lighthouse-device-matrix) }}
        include:
          - device: mobile
            form-factor: mobile
            port: 3001
          - device: desktop
            form-factor: desktop
            port: 3002
          - device: tablet
            form-factor: mobile
            port: 3003
            viewport-width: 768
            viewport-height: 1024
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: .next
          key: ${{ needs.build-app.outputs.build-cache-key }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-
          fail-on-cache-miss: true

      - name: Install dependencies (if not cached)
        run: |
          if [ ! -d "node_modules" ] || [ ! -f "node_modules/.package-lock.json" ]; then
            echo "Installing dependencies..."
            npm ci --prefer-offline
          else
            echo "✓ node_modules exists and appears complete - skipping npm ci"
          fi

      - name: Restore LHCI tools cache
        uses: actions/cache@v5
        with:
          path: |
            lhci-tools/node_modules
            lhci-tools/package.json
            lhci-tools/package-lock.json
          key: lhci-tools-${{ runner.os }}-0.12.x
          fail-on-cache-miss: true

      - name: Verify LHCI tools
        run: |
          echo "Verifying LHCI tools..."
          npx --prefix lhci-tools lhci --version
          npx --prefix lhci-tools wait-on --version
          echo "✓ LHCI tools verified"

      - name: Run Lighthouse audit
        id: lighthouse
        timeout-minutes: 8
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'mock-anon-key' }}
          STRIPE_SECRET_KEY: mock-stripe-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
        run: |
          DEVICE="${{ matrix.device }}"
          FORM_FACTOR="${{ matrix.form-factor }}"
          PORT="${{ matrix.port }}"
          VIEWPORT_WIDTH="${{ matrix.viewport-width }}"
          VIEWPORT_HEIGHT="${{ matrix.viewport-height }}"

          echo "Running Lighthouse audit for $DEVICE..."
          echo "Working directory: $(pwd)"

          PORT=$PORT npm run start &
          APP_PID=$!

          cleanup() {
            echo "Cleaning up server (PID: $APP_PID)..."
            kill -TERM $APP_PID 2>/dev/null || true
            sleep 2
            kill -KILL $APP_PID 2>/dev/null || true
            wait $APP_PID 2>/dev/null || true
          }
          trap cleanup EXIT

          echo "Waiting for server on http://localhost:$PORT..."
          npx --prefix lhci-tools wait-on --timeout 60000 http://localhost:$PORT

          SETTINGS="--settings.emulatedFormFactor=$FORM_FACTOR"
          if [ -n "$VIEWPORT_WIDTH" ]; then
            SETTINGS="$SETTINGS --settings.screenEmulation.width=$VIEWPORT_WIDTH --settings.screenEmulation.height=$VIEWPORT_HEIGHT"
          fi

          npx --prefix lhci-tools lhci collect \
            --url=http://localhost:$PORT \
            --numberOfRuns=1 \
            $SETTINGS \
            --settings.maxWaitForLoad=60000 \
            --settings.chromeFlags="--no-sandbox --disable-dev-shm-usage" \
            --no-upload

          cleanup
          trap - EXIT

          echo "Checking for generated reports..."
          ls -la .lighthouseci/ || echo "No .lighthouseci directory found"

          mkdir -p lighthouse-reports
          if [ -d .lighthouseci ]; then
            cp -r .lighthouseci/* lighthouse-reports/ 2>/dev/null || true
            echo "Copied reports to lighthouse-reports/"
            ls -la lighthouse-reports/
          fi

          JSON_COUNT=$(find lighthouse-reports -name "*.json" -type f 2>/dev/null | wc -l)
          if [ "$JSON_COUNT" -gt 0 ]; then
            echo "✓ Lighthouse $DEVICE audit completed successfully! Found $JSON_COUNT JSON report(s)"
          else
            echo "⚠ Warning: No JSON reports found for $DEVICE"
          fi

      - name: Debug - Check files before upload
        if: failure()
        run: |
          echo "Current directory:"
          pwd
          echo "Checking lighthouse-reports directory:"
          ls -la lighthouse-reports/ || echo "Directory not found"
          echo "Finding JSON files:"
          find lighthouse-reports -name "*.json" -type f 2>/dev/null || echo "No JSON files found"

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-${{ matrix.device }}
          path: lighthouse-reports/
          retention-days: 7
          if-no-files-found: warn

  lighthouse-report:
    name: Generate Lighthouse Report
    runs-on: ubuntu-latest
    needs: [lighthouse]
    if: always() && needs.lighthouse.result != 'skipped'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: lighthouse-results

      - name: Generate PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs').promises;
            const path = require('path');

            const getScoreEmoji = (score) => {
              if (score >= 90) return '🟢';
              if (score >= 75) return '🟡';
              return '🔴';
            };

            const processDevice = async (device) => {
              try {
                const dir = `lighthouse-results/lighthouse-${device}`;
                const allFiles = await fs.readdir(dir, { recursive: true });
                const jsonFile = allFiles.find(f => f.endsWith('.json') && f.includes('lhr-'));

                if (!jsonFile) {
                  console.log(`No JSON file found for ${device}. Files:`, allFiles);
                  return null;
                }

                const report = JSON.parse(await fs.readFile(path.join(dir, jsonFile), 'utf8'));
                const categories = report.categories;

                return {
                  performance: Math.round(categories.performance.score * 100),
                  accessibility: Math.round(categories.accessibility.score * 100),
                  bestPractices: Math.round(categories['best-practices'].score * 100),
                  seo: Math.round(categories.seo.score * 100)
                };
              } catch (error) {
                console.log(`No data for ${device}: ${error.message}`);
                return null;
              }
            };

            const [mobile, desktop, tablet] = await Promise.all([
              processDevice('mobile'),
              processDevice('desktop'),
              processDevice('tablet')
            ]);

            const formatRow = (device, scores) => {
              if (!scores) return `| ${device} | ❌ No data | - | - | - |`;
              return `| ${device} | ${getScoreEmoji(scores.performance)} ${scores.performance} | ${getScoreEmoji(scores.accessibility)} ${scores.accessibility} | ${getScoreEmoji(scores.bestPractices)} ${scores.bestPractices} | ${getScoreEmoji(scores.seo)} ${scores.seo} |`;
            };

            const comment = [
              '## ⚡ Lighthouse Audit Results',
              '',
              '| Device | Performance | Accessibility | Best Practices | SEO |',
              '|--------|-------------|---------------|----------------|-----|',
              formatRow('📱 Mobile', mobile),
              formatRow('🖥️ Desktop', desktop),
              formatRow('📱 Tablet', tablet),
              '',
              '**Legend:** 🟢 90+ | 🟡 75-89 | 🔴 <75',
              '',
              `[View detailed reports](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Generate Actions Summary
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs').promises;
            const path = require('path');

            const getScoreEmoji = (score) => {
              if (score >= 90) return '🟢';
              if (score >= 75) return '🟡';
              return '🔴';
            };

            const processDevice = async (device) => {
              try {
                const dir = `lighthouse-results/lighthouse-${device}`;
                const allFiles = await fs.readdir(dir, { recursive: true });
                const jsonFile = allFiles.find(f => f.endsWith('.json') && f.includes('lhr-'));

                if (!jsonFile) {
                  console.log(`No JSON file found for ${device}. Files:`, allFiles);
                  return null;
                }

                const report = JSON.parse(await fs.readFile(path.join(dir, jsonFile), 'utf8'));
                const categories = report.categories;

                return {
                  performance: Math.round(categories.performance.score * 100),
                  accessibility: Math.round(categories.accessibility.score * 100),
                  bestPractices: Math.round(categories['best-practices'].score * 100),
                  seo: Math.round(categories.seo.score * 100)
                };
              } catch (error) {
                console.log(`No data for ${device}: ${error.message}`);
                return null;
              }
            };

            const [mobile, desktop, tablet] = await Promise.all([
              processDevice('mobile'),
              processDevice('desktop'),
              processDevice('tablet')
            ]);

            const formatRow = (device, scores) => {
              if (!scores) return `| ${device} | ❌ No data | - | - | - |`;
              return `| ${device} | ${getScoreEmoji(scores.performance)} ${scores.performance} | ${getScoreEmoji(scores.accessibility)} ${scores.accessibility} | ${getScoreEmoji(scores.bestPractices)} ${scores.bestPractices} | ${getScoreEmoji(scores.seo)} ${scores.seo} |`;
            };

            let summary = `# ⚡ Lighthouse Audit Results\n\n`;
            summary += `> Branch: \`${process.env.GITHUB_REF_NAME}\` • Run: #${process.env.GITHUB_RUN_NUMBER}\n\n`;
            summary += `| Device | Performance | Accessibility | Best Practices | SEO |\n`;
            summary += `|--------|-------------|---------------|----------------|-----|\n`;
            summary += `${formatRow('📱 Mobile', mobile)}\n`;
            summary += `${formatRow('🖥️ Desktop', desktop)}\n`;
            summary += `${formatRow('📱 Tablet', tablet)}\n\n`;
            summary += `**Legend:** 🟢 90+ | 🟡 75-89 | 🔴 <75\n\n`;
            summary += `---\n*Generated on ${new Date().toLocaleString('de-DE', { timeZone: 'Europe/Berlin' })} CET*`;

            await core.summary.addRaw(summary).write();

      - name: Prepare Discord notification
        if: always()
        id: prepare-discord
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs').promises;
            const path = require('path');

            const getScoreColor = (score) => {
              if (score >= 90) return 0x00ff00;
              if (score >= 75) return 0xffff00;
              return 0xff0000;
            };

            const getScoreEmoji = (score) => {
              if (score >= 90) return '🟢';
              if (score >= 75) return '🟡';
              return '🔴';
            };

            const processDevice = async (device) => {
              try {
                const dir = `lighthouse-results/lighthouse-${device}`;
                const allFiles = await fs.readdir(dir, { recursive: true });
                const jsonFile = allFiles.find(f => f.endsWith('.json') && f.includes('lhr-'));

                if (!jsonFile) return null;

                const report = JSON.parse(await fs.readFile(path.join(dir, jsonFile), 'utf8'));
                const categories = report.categories;

                return {
                  performance: Math.round(categories.performance.score * 100),
                  accessibility: Math.round(categories.accessibility.score * 100),
                  bestPractices: Math.round(categories['best-practices'].score * 100),
                  seo: Math.round(categories.seo.score * 100)
                };
              } catch (error) {
                return null;
              }
            };

            const [mobile, desktop, tablet] = await Promise.all([
              processDevice('mobile'),
              processDevice('desktop'),
              processDevice('tablet')
            ]);

            const scores = [mobile, desktop, tablet].filter(s => s !== null);
            const avgPerformance = scores.length > 0
              ? Math.round(scores.reduce((sum, s) => sum + s.performance, 0) / scores.length)
              : 0;

            const formatField = (device, emoji, scores) => {
              if (!scores) {
                return {
                  name: `${emoji} ${device}`,
                  value: '❌ No data available',
                  inline: true
                };
              }
              return {
                name: `${emoji} ${device}`,
                value: [
                  `${getScoreEmoji(scores.performance)} **Performance:** ${scores.performance}`,
                  `${getScoreEmoji(scores.accessibility)} **Accessibility:** ${scores.accessibility}`,
                  `${getScoreEmoji(scores.bestPractices)} **Best Practices:** ${scores.bestPractices}`,
                  `${getScoreEmoji(scores.seo)} **SEO:** ${scores.seo}`
                ].join('\n'),
                inline: true
              };
            };

            const eventType = process.env.GITHUB_EVENT_NAME;
            const branch = process.env.GITHUB_REF_NAME;
            const runNumber = process.env.GITHUB_RUN_NUMBER;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const repoUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}`;

            let title = '⚡ Lighthouse Audit Results';
            let description = `**Branch:** \`${branch}\`\n**Run:** #${runNumber}`;

            if (eventType === 'pull_request') {
              const prNumber = context.payload.pull_request?.number;
              const prUrl = context.payload.pull_request?.html_url;
              title = `⚡ Lighthouse Audit - PR #${prNumber}`;
              description = `**PR:** [#${prNumber}](${prUrl})\n**Branch:** \`${branch}\``;
            } else if (eventType === 'push') {
              title = '⚡ Lighthouse Audit - Push to Main';
            } else if (eventType === 'workflow_dispatch') {
              title = '⚡ Lighthouse Audit - Manual Run';
            }

            const embed = {
              title,
              description,
              color: getScoreColor(avgPerformance),
              fields: [
                formatField('Mobile', '📱', mobile),
                formatField('Desktop', '🖥️', desktop),
                formatField('Tablet', '📱', tablet),
                {
                  name: '📊 Legend',
                  value: '🟢 Excellent (90+) • 🟡 Good (75-89) • 🔴 Needs Work (<75)',
                  inline: false
                },
                {
                  name: '🔗 Links',
                  value: `[View Full Report](${runUrl}) • [Repository](${repoUrl})`,
                  inline: false
                }
              ],
              timestamp: new Date().toISOString(),
              footer: {
                text: 'Lighthouse CI',
                icon_url: 'https://raw.githubusercontent.com/GoogleChrome/lighthouse/main/assets/lighthouse-logo.png'
              }
            };

            await fs.writeFile('discord-payload.json', JSON.stringify({ embeds: [embed] }));
            console.log('Discord payload prepared');

      - name: Create device zip files and send to Discord
        if: always()
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_LIGHTHOUSE_REPORTS }}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "ℹ️ DISCORD_WEBHOOK_LIGHTHOUSE_REPORTS secret is not set. Skipping Discord notification."
            exit 0
          fi

          echo "Creating zip files for available device reports..."

          cd lighthouse-results
          for device in mobile desktop tablet; do
            if [ -d "lighthouse-${device}" ]; then
              echo "Creating zip for ${device}..."
              cd "lighthouse-${device}"
              zip -r "../../lighthouse-${device}-report.zip" . -i "*.json" "*.html" 2>/dev/null || true
              cd ..

              if [ -f "../lighthouse-${device}-report.zip" ] && [ -s "../lighthouse-${device}-report.zip" ]; then
                echo "✓ Created lighthouse-${device}-report.zip"
              else
                echo "⚠ Warning: Failed to create zip for ${device}"
              fi
            else
              echo "ℹ No reports found for ${device} (may not have been audited)"
            fi
          done
          cd ..

          echo ""
          echo "Available zip files:"
          ls -lh lighthouse-*-report.zip 2>/dev/null || echo "No zip files created"

          echo ""
          echo "Sending Discord notification with embed and attachments..."

          CURL_ARGS=(-s -S)

          FILE_COUNT=0
          if [ -f lighthouse-mobile-report.zip ] && [ -s lighthouse-mobile-report.zip ]; then
            CURL_ARGS+=(-F "files[$FILE_COUNT]=@lighthouse-mobile-report.zip")
            FILE_COUNT=$((FILE_COUNT + 1))
            echo "  📱 Adding mobile report"
          fi

          if [ -f lighthouse-desktop-report.zip ] && [ -s lighthouse-desktop-report.zip ]; then
            CURL_ARGS+=(-F "files[$FILE_COUNT]=@lighthouse-desktop-report.zip")
            FILE_COUNT=$((FILE_COUNT + 1))
            echo "  🖥️ Adding desktop report"
          fi

          if [ -f lighthouse-tablet-report.zip ] && [ -s lighthouse-tablet-report.zip ]; then
            CURL_ARGS+=(-F "files[$FILE_COUNT]=@lighthouse-tablet-report.zip")
            FILE_COUNT=$((FILE_COUNT + 1))
            echo "  📱 Adding tablet report"
          fi

          if [ -f discord-payload.json ]; then
            CURL_ARGS+=(-F "payload_json=<discord-payload.json")
          else
            echo "❌ Error: discord-payload.json not found"
            exit 1
          fi

          echo ""
          echo "Sending $FILE_COUNT file(s) with embed to Discord..."

          RESPONSE=$(curl "${CURL_ARGS[@]}" "$WEBHOOK_URL")
          CURL_EXIT_CODE=$?

          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "❌ Error: curl failed with exit code $CURL_EXIT_CODE"
            exit $CURL_EXIT_CODE
          fi

          if [ -n "$RESPONSE" ] && echo "$RESPONSE" | grep -q "error"; then
            echo "❌ Error from Discord API: $RESPONSE"
            exit 1
          fi

          echo ""
          echo "✓ Discord notification sent successfully with $FILE_COUNT attachment(s)"

  visual-review:
    name: Visual Review (PostHog)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [lint, type-check, check-runs, install-playwright, build-app]
    if: needs.check-runs.outputs.should-run-visual == 'true'
    steps:
      - name: Checkout (latest branch tip)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm_config_legacy_peer_deps=true npm ci --prefer-offline

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ needs.install-playwright.outputs.playwright-cache-key }}
          fail-on-cache-miss: true

      - name: Install Playwright system dependencies
        run: npx playwright install-deps

      - name: Restore build cache
        id: restore-build
        uses: actions/cache/restore@v5
        with:
          path: .next
          key: ${{ needs.build-app.outputs.build-cache-key }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-

      - name: Build Next.js app (cache miss fallback)
        if: steps.restore-build.outputs.cache-hit != 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Run Playwright visual tests
        run: npx playwright test --project=chromium --grep @visual --reporter=list
        env:
          BASE_URL: http://localhost:3000
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        continue-on-error: true

      - name: Install PostHog Visual Review CLI
        if: always()
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/PostHog/posthog.git /tmp/posthog
          cd /tmp/posthog
          git sparse-checkout set products/visual_review/cli
          cd products/visual_review/cli
          npm ci

      - name: Create PostHog Visual Review run
        if: always()
        id: vr-run
        run: |
          RUN_ID=$(npx tsx /tmp/posthog/products/visual_review/cli/src/index.ts run create \
            --type playwright \
            --baseline playwright/snapshots.yml \
            --token ${{ secrets.POSTHOG_VR_TOKEN }} \
            --branch ${{ github.event.pull_request.head.ref || github.ref_name }} \
            --commit $(git rev-parse HEAD) \
            ${{ github.event_name == 'pull_request' && format('--pr {0}', github.event.pull_request.number) || '' }})
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Created PostHog VR run: $RUN_ID"

      - name: Upload snapshots to PostHog Visual Review
        if: always() && steps.vr-run.outputs.run-id != ''
        run: |
          npx tsx /tmp/posthog/products/visual_review/cli/src/index.ts run upload \
            --run-id ${{ steps.vr-run.outputs.run-id }} \
            --dir playwright/__snapshots__ \
            --baseline playwright/snapshots.yml \
            --token ${{ secrets.POSTHOG_VR_TOKEN }}

      - name: Wait for PostHog diff processing
        if: always() && steps.vr-run.outputs.run-id != ''
        id: vr-complete
        run: |
          npx tsx /tmp/posthog/products/visual_review/cli/src/index.ts run complete \
            --run-id ${{ steps.vr-run.outputs.run-id }} \
            --baseline playwright/snapshots.yml \
            --token ${{ secrets.POSTHOG_VR_TOKEN }} 2>&1 | tee vr-output.txt || echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Generate PostHog Visual Review Summary
        if: always() && steps.vr-run.outputs.run-id != ''
        run: |
          REVIEW_URL="https://eu.posthog.com/project/76914/visual_review/runs/${{ steps.vr-run.outputs.run-id }}"
          STATS=$(grep "Done:" vr-output.txt || true)
          echo "### 🎨 PostHog Visual Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$STATS" ]; then
            SUMMARY=$(echo "$STATS" | sed 's/.*Done: //')
            echo "✅ **Processing Complete**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Result: $SUMMARY" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏳ **Processing Timed Out / Interrupted**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The diff engine is still working or encountered an issue. Please check the dashboard manually." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔍 **[Review Visual Changes on PostHog]($REVIEW_URL)**" >> $GITHUB_STEP_SUMMARY
          if grep -q "Visual changes detected" vr-output.txt; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
            echo "> **Visual regressions or new snapshots detected.** Please review and approve them in PostHog to update the baseline." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.vr-complete.outputs.exit_code }}" == "1" ]; then
             echo "Visual changes detected. Review required."
             exit 1
          fi

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Comment Deployment Starting
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const marker = '<!-- preview-deploy-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existingComment = comments.find(c => c.body.includes(marker));
            const body = `${marker}\n⏳ **Build finished. Deploying to Cloud Run...**`;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            }

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy Preview to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: mietevo
          region: europe-west1
          image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mietevo/mietevo:pr-${{ github.event.pull_request.number }}
          tag: pr-${{ github.event.pull_request.number }}
          labels: pr=pr-${{ github.event.pull_request.number }}
          no_traffic: true
          env_vars: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_WORKER_URL=${{ secrets.NEXT_PUBLIC_WORKER_URL }}
            STRIPE_SECRET_KEY=${{ secrets.STAGING_STRIPE_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STAGING_STRIPE_WEBHOOK_SECRET }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
            TOKEN_ENCRYPTION_KEY=${{ secrets.STAGING_TOKEN_ENCRYPTION_KEY }}
            WORKER_AUTH_KEY=${{ secrets.WORKER_AUTH_KEY }}
            USER_HEADER_SECRET=${{ secrets.USER_HEADER_SECRET }}
            OUTLOOK_CLIENT_ID=${{ secrets.OUTLOOK_CLIENT_ID }}
            OUTLOOK_CLIENT_SECRET=${{ secrets.OUTLOOK_CLIENT_SECRET }}
            OUTLOOK_TENANT_ID=${{ secrets.OUTLOOK_TENANT_ID }}

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          START_TIME: ${{ needs.docker-build.outputs.start_time }}
        with:
          script: |
            const startTimeStr = process.env.START_TIME;
            const startTime = (startTimeStr && startTimeStr !== 'null') ? new Date(startTimeStr) : new Date();
            const endTime = new Date();
            const durationMs = endTime - startTime;
            const durationSec = Math.floor(durationMs / 1000);
            const durationStr = durationSec > 60
              ? `${Math.floor(durationSec / 60)}m ${durationSec % 60}s`
              : `${durationSec}s`;

            const prNumber = context.issue.number;
            const marker = '<!-- preview-deploy-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existingComment = comments.find(c => c.body.includes(marker));

            const timestamp = endTime.toISOString().replace('T', ' ').split('.')[0] + ' UTC';
            const body = `${marker}\n✅ **New version is live!**\n\n🔗 **[Preview #${prNumber}](${process.env.DEPLOY_URL})**\n\n🕒 **Deployed at:** ${timestamp}\n⏱️ **Duration:** ${durationStr} (Build + Deploy)`;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: mietevo
          region: europe-west1
          image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mietevo/mietevo:latest
          env_vars: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_WORKER_URL=${{ secrets.NEXT_PUBLIC_WORKER_URL }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            TOKEN_ENCRYPTION_KEY=${{ secrets.TOKEN_ENCRYPTION_KEY }}
            WORKER_AUTH_KEY=${{ secrets.WORKER_AUTH_KEY }}
