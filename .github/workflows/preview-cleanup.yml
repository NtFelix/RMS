name: Preview Cleanup

on:
  pull_request:
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup-preview:
    name: Cleanup Preview Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Remove Preview Tag
        run: |
          gcloud run services update-traffic mietevo \
            --remove-tags=pr-${{ github.event.pull_request.number }} \
            --region=europe-west1 || echo "Tag not found or already removed"

      - name: Delete Preview Revision
        run: |
          REVISION=$(gcloud run revisions list \
            --service=mietevo \
            --region=europe-west1 \
            --filter="metadata.labels.pr=pr-${{ github.event.pull_request.number }}" \
            --format="value(metadata.name)" \
            --limit=1)
          if [ -n "$REVISION" ]; then
            echo "Deleting revision: $REVISION"
            gcloud run revisions delete "$REVISION" --region=europe-west1 --quiet
            echo "✓ Revision deleted"
          else
            echo "No revision found for this PR tag"
          fi

      - name: Delete Docker Image from Artifact Registry
        run: |
          gcloud artifacts docker images delete \
            europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mietevo/mietevo:pr-${{ github.event.pull_request.number }} \
            --quiet || echo "Image not found"
